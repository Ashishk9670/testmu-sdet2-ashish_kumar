name: Hybrid Automation

on:
  push:
    branches: ["main", "master", "codex/**"]
  pull_request:
    branches: ["main", "master"]
  schedule:
    - cron: "0 11 * * *"

permissions:
  contents: read
  statuses: write

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run API tests
        run: mvn clean test -Dgroups=api -Denv=qa -Dheadless=true

      - name: Upload API Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-allure-results
          path: allure-results

  ui-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Chrome
        if: matrix.browser == 'chrome'
        uses: browser-actions/setup-chrome@v1

      - name: Set up Firefox
        if: matrix.browser == 'firefox'
        uses: browser-actions/setup-firefox@v1

      - name: Run UI tests
        run: mvn clean test -DsuiteXmlFile=src/test/resources/suites/ui-suite.xml -Dbrowser=${{ matrix.browser }} -Dheadless=true

      - name: Upload UI Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-${{ matrix.browser }}-allure-results
          path: allure-results

      - name: Upload UI support artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-${{ matrix.browser }}-support-artifacts
          path: |
            screenshots
            logs

  integration-tests:
    runs-on: ubuntu-latest
    needs: [api-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run integration tests
        run: mvn clean test -Dgroups=integration -Dheadless=true

      - name: Upload integration Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-allure-results
          path: allure-results

      - name: Upload integration support artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-support-artifacts
          path: |
            screenshots
            logs

  publish-allure-report:
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests, integration-tests]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: "*allure-results"
          path: allure-results
          merge-multiple: true

      - name: Generate Allure report
        run: mvn allure:report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin

  notify-status:
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests, integration-tests, publish-allure-report]
    if: always()
    permissions:
      statuses: write
    steps:
      - name: Set GitHub commit status
        uses: actions/github-script@v7
        with:
          script: |
            const jobResults = {
              'api-tests': '${{ needs.api-tests.result }}',
              'ui-tests': '${{ needs.ui-tests.result }}',
              'integration-tests': '${{ needs.integration-tests.result }}',
              'publish-allure-report': '${{ needs.publish-allure-report.result }}'
            };

            const failedJobs = Object.entries(jobResults)
              .filter(([, result]) => result !== 'success')
              .map(([name]) => name);

            const state = failedJobs.length === 0 ? 'success' : 'failure';
            const description = failedJobs.length === 0
              ? 'All automation jobs passed and the Allure report was published.'
              : `Failed jobs: ${failedJobs.join(', ')}`;

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'Hybrid Automation / suite',
              description,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
